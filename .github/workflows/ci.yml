name: Build & Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: cat-frontend/package-lock.json }
      - run: cd cat-frontend && npm install
      - run: cd cat-frontend && npx tsc --noEmit
      - run: cd cat-frontend && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: cat-frontend/dist/

  build-miniprogram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: cat-miniprogram/package-lock.json }
      - run: cd cat-miniprogram && npm install && npx taro build --type weapp
      - uses: actions/upload-artifact@v4
        with:
          name: miniprogram-dist
          path: cat-miniprogram/dist/

  check-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r cat-backend/requirements.txt httpx==0.27.0 pytest
      - run: cd cat-backend && python -m compileall app/
      - run: cd cat-backend && JWT_SECRET=ci-test-secret ADMIN_PASSWORD=ci-admin-pass pytest tests/ -q
