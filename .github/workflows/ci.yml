name: Build & Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1. 构建 React Web 前端 + 验证 Docker 镜像
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: cat-frontend/package-lock.json }
      - run: cd cat-frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: cat-frontend/dist/

  # 2. 构建 Taro 小程序
  build-miniprogram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: cat-miniprogram/package-lock.json }
      - run: cd cat-miniprogram && npm ci && npx taro build --type weapp
      - uses: actions/upload-artifact@v4
        with:
          name: miniprogram-dist
          path: cat-miniprogram/dist/

  # 3. 验证后端 Python 语法
  check-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python -m compileall cat-backend/app/
