services:
  frontend:
    build: ./cat-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./cat-frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: on-failure

  backend:
    build: ./cat-backend
    ports:
      - "8000:8000"
    volumes:
      - ./cat-backend/uploads:/app/uploads
      - ./cat-backend/cat_community.db:/app/cat_community.db
    environment:
      - DATABASE_URL=sqlite:///./cat_community.db
      - UPLOAD_DIR=./uploads
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    restart: on-failure
