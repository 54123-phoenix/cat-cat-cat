services:
  frontend:
    build: ./cat-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./cat-frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure

  backend:
    build: ./cat-backend
    ports:
      - "8000:8000"
    volumes:
      - ./cat-backend:/app
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=mysql+pymysql://root:***@db:3306/cat_community
      - UPLOAD_DIR=./uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cat_community
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: on-failure
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  mysql_data:
