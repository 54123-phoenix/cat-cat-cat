services:
  frontend:
    build: ./cat-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: on-failure

  backend:
    build: ./cat-backend
    ports:
      - "8000:8000"
    volumes:
      - ./cat-backend/cat_community.db:/app/data
      - ./cat-backend/uploads:/app/uploads
      - ./cat-backend/models:/app/models
      - ./cat-backend/embeddings:/app/embeddings
    environment:
      - DATABASE_URL=sqlite:///./data/cat_community.db
      - UPLOAD_DIR=./uploads
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      - INIT_DEMO_USER=${INIT_DEMO_USER:-0}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:4173,http://localhost}
      - WECHAT_APPID=${WECHAT_APPID:-}
      - WECHAT_SECRET=${WECHAT_SECRET:-}
      - WECHAT_DEV_MODE=${WECHAT_DEV_MODE:-0}
      - RECOGNIZE_THRESHOLD_CONFIRMED=${RECOGNIZE_THRESHOLD_CONFIRMED:-0.57}
      - RECOGNIZE_THRESHOLD_UNCERTAIN=${RECOGNIZE_THRESHOLD_UNCERTAIN:-0.49}
      - RATE_RECOGNIZE_PER_MIN=${RATE_RECOGNIZE_PER_MIN:-10}
      - RATE_POST_PER_MIN=${RATE_POST_PER_MIN:-5}
      - RATE_SIGHTING_PER_MIN=${RATE_SIGHTING_PER_MIN:-20}
      - RATE_REGISTER_PER_MIN=${RATE_REGISTER_PER_MIN:-10}
      - RATE_LOGIN_PER_MIN=${RATE_LOGIN_PER_MIN:-5}
      - RATE_AGENT_PER_MIN=${RATE_AGENT_PER_MIN:-20}
      - AGENT_ENABLED=${AGENT_ENABLED:-1}
      - AGENT_BASE_URL=${AGENT_BASE_URL:-https://api.openai.com/v1}
      - AGENT_API_KEY=${AGENT_API_KEY:-}
      - AGENT_MODEL=${AGENT_MODEL:-}
      - AGENT_TIMEOUT_SECONDS=${AGENT_TIMEOUT_SECONDS:-25}
      - AGENT_MAX_TOOL_CALLS=${AGENT_MAX_TOOL_CALLS:-3}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    command: gunicorn app.main:app -c gunicorn.conf.py
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cat_community
      - POSTGRES_USER=cat
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-catdev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: on-failure

volumes:
  pgdata:
